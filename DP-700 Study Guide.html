<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Parquet — Design Canvas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300..900;1,8..60,300..900&family=Public+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  body { margin: 0; font-family: 'Public Sans', system-ui, sans-serif; background: #e8e3d5; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" data-presets="react">
function App() {
  return (
    <window.DesignCanvas projectName="Parquet — DP-700 Study Hub">
      <window.DCSection id="landing" title="Landing Page · two directions">
        <window.DCArtboard id="a1" label="A · The Library (textbook index)" width={1280} height={2600}>
          <iframe src="landing-library.html" style={{width:'100%',height:'100%',border:'none'}} />
        </window.DCArtboard>
        <window.DCArtboard id="a2" label="B · The Journal (editorial front page)" width={1280} height={2600}>
          <iframe src="landing-journal.html" style={{width:'100%',height:'100%',border:'none'}} />
        </window.DCArtboard>
      </window.DCSection>
      <window.DCSection id="quiz" title="Quiz page · shared between both landings">
        <window.DCArtboard id="q1" label="Quiz · mid-session (Chapter I · Online Dumps)" width={1280} height={2000}>
          <iframe src="quiz.html?q=0" style={{width:'100%',height:'100%',border:'none'}} />
        </window.DCArtboard>
      </window.DCSection>
    </window.DesignCanvas>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
